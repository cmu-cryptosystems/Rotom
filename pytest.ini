[pytest]
# Default: skip @pytest.mark.slow (matches CI). Nightly overrides addopts to run them.
# Slow-only locally: pytest --override-ini="addopts=-v --tb=short --strict-markers --disable-warnings" -m slow
testpaths = tests frontends/tests ir/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not slow"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    backend: marks tests that require specific backend
    openfhe: marks tests that require OpenFHE backend
    toy: marks tests that use toy backend
    e2e: marks end-to-end tests (artifacts / downloads may be required)
