# Evolve matmul_layout_program.py (local-search hyperparameters for matmul layouts)
max_iterations: 20
checkpoint_interval: 5

llm:
  primary_model: "gemini-2.5-flash-lite"
  primary_model_weight: 0.85
  secondary_model: "gemini-2.5-flash"
  secondary_model_weight: 0.15
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  temperature: 0.7
  max_tokens: 8000
  timeout: 180

prompt:
  system_message: |
    You edit matmul_layout_program.py. Implement get_matmul_search_config() returning a dict:
    neighbor_mode: "default" or "wide" (wide = all traversal permutations when dim count ≤6).
    max_local_attempts: positive int, or 0 for unlimited (can be slow).
    max_attempts_per_seed: cap trials per base MATMUL kernel; 0 = unlimited.
    m, k, n: logical matmul shape A[m,k] @ B[k,n]; slots: HE n; roll_flag: bool.
    Goal: maximize evaluator combined_score = baseline_min_cost / evolved_min_cost by finding
    cheaper alignment-valid MATMUL layouts via evolve_openevolve.matmul_layout_explore.local_search.
    Keep imports valid with PYTHONPATH=Rotom repo root.

database:
  population_size: 32
  archive_size: 12
  num_islands: 2
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.65
  similarity_threshold: 0.99

evaluator:
  timeout: 300
  cascade_evaluation: false
  parallel_evaluations: 1

diff_based_evolution: true
max_code_length: 8000
